name: Update Loto6 Data

on:
  # 毎週月・木曜の日本時間20:00（UTC 11:00）に実行
  # ロト6の抽選は月・木曜の18:45頃
  schedule:
    - cron: '0 11 * * 1,4'
  
  # 手動実行も可能
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      # Puppeteerとその依存関係をインストール
      - name: Install dependencies
        run: npm ci

      - name: Run update script
        run: node scripts/update-data.js
      
      - name: Check for changes
        id: git-check
        run: |
          git diff --exit-code public/data/loto6_history.json || echo "changed=true" >> $GITHUB_OUTPUT
      
      - name: Commit and push changes
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add public/data/loto6_history.json
          git commit -m "🎰 Update Loto6 data - $(date +'%Y-%m-%d')"
          git push

      - name: Trigger Vercel Deployment
        if: steps.git-check.outputs.changed == 'true'
        run: curl -X POST ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
